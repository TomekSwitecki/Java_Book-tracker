name: CI

on:
  push:
    branches: [master]

  pull_request:
    branches: [master]

jobs:

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: book-tracker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: spring-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: chmod +x mvnw

      - run: ./mvnw clean package